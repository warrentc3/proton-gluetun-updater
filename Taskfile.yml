version: "3"

vars:
  IMAGE_NAME: protonvpn-gluetun-updater

tasks:
  build:
    desc: Build the Docker image.
    summary: |
      Build the Docker image for the protonvpn-gluetun-updater.

      The image is based on python:3.12-slim and includes all
      dependencies needed to fetch and filter ProtonVPN servers.
    preconditions:
      - sh: command -v docker
        msg: Docker is not installed or not in PATH.
      - sh: test -f Dockerfile
        msg: Dockerfile not found in the current directory.
    cmds:
      - docker build -t {{.IMAGE_NAME}} .

  run:
    desc: Run the updater via Docker.
    summary: |
      Build then run the protonvpn-gluetun-updater container.

      The container receives STORAGE_FILEPATH and filter environment
      variables (IP6, SECURE_CORE, TOR, FREE_TIER). STORAGE_FILEPATH
      is mounted as a volume so the container can write the
      servers-proton.json file.

      Filter defaults: IP6=exclude, SECURE_CORE=include, TOR=include, FREE_TIER=include
    deps:
      - build
    env:
      STORAGE_FILEPATH: /mnt/nas/k8s/volumes/gluetun
      IP6: exclude
      SECURE_CORE: include
      TOR: include
      FREE_TIER: include
    preconditions:
      - sh: test -d $STORAGE_FILEPATH
        msg: "Storage directory does not exist: $STORAGE_FILEPATH"
    cmds:
      - docker run --rm -it
        -e STORAGE_FILEPATH
        -e IP6
        -e SECURE_CORE
        -e TOR
        -e FREE_TIER
        -e PROTON_USERNAME
        -v $STORAGE_FILEPATH:$STORAGE_FILEPATH
        {{.IMAGE_NAME}}

  update-gluetun-protonvpn-servers:
    desc: Update gluetun protonvpn servers list.
    summary: |
      Alias for the 'run' task.

      Kept for backward compatibility.
    cmds:
      - task: run
