services:
  gtupdate:
    image: ghcr.io/warrentc3/proton-gluetun-updater:latest
    container_name: protonvpn-gluetun-updater
    volumes:
      - /path/to/gluetun:/gluetun  # Mandatory: Set this to your gluetun configuration directory
      - /path/to/debug:/debug # Optional: Set this to a directory to store debug logs if DEBUG is enabled.  When DEBUG=true and DEBUG_DIR is unset, defaults to STORAGE_FILEPATH/debug subdirectory.
    ports:
      - "8080:8080" # OPTIONAL: Web dashboard port. Change left side to remap host port.
    env_file:
      - .env
    environment:
      STORAGE_FILEPATH: /gluetun # MANDATORY: Storage directory path (output file: servers-proton.json)
      SECURE_CORE: include # OPTIONAL: Filter Secure Core servers: include (default), exclude, or only
      TOR: include # OPTIONAL: Filter TOR servers: include (default), exclude, or only
      FREE_TIER: include # OPTIONAL: Filter free tier servers: include (default), exclude, or only
      REPLACE_GLUETUN_SERVERS_JSON: false # OPTIONAL: Replace servers.json with servers-proton.json. Defaults to false if not set.
      WEB_HOST: 0.0.0.0 # OPTIONAL: Dashboard bind address. Defaults to 127.0.0.1 (localhost-only). Use 0.0.0.0 to expose publicly.
      WEB_PORT: 8080 # OPTIONAL: Port for the web dashboard. Defaults to 8080 if not set.
      IP6: exclude # OPTIONAL: IPv6 behavior: exclude (default), include, or only
      DEBUG: false # OPTIONAL: Enable debug logging. Defaults to false if not set.
      DEBUG_DIR: /debug # OPTIONAL: Set this to a directory to store debug logs if DEBUG is enabled.  When DEBUG=true and DEBUG_DIR is unset, defaults to STORAGE_FILEPATH/debug subdirectory.